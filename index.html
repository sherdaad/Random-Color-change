
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KababJees - Food Delivery</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(to bottom right, #fff5f0, #ffe5e5);
  min-height: 100vh;
}

/* HEADER */
header {
  background: #dc2626;
  color: white;
  padding: 20px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-content {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  font-size: 40px;
}

.logo h1 {
  font-size: 28px;
  font-weight: bold;
}

.logo p {
  font-size: 12px;
  color: #ffcccc;
}

/* SEARCH BAR */
.search-container {
  flex: 1;
  max-width: 400px;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 12px 40px 12px 40px;
  border-radius: 50px;
  border: none;
  font-size: 16px;
  outline: none;
}

.search-input:focus {
  box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.5);
}

.search-icon {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #666;
}

/* CART BUTTON */
.cart-btn {
  background: #fbbf24;
  color: #7c2d12;
  padding: 12px 24px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  position: relative;
  transition: all 0.3s;
}

.cart-btn:hover {
  background: #f59e0b;
  transform: scale(1.05);
}

.cart-count {
  position: absolute;
  top: -8px;
  right: -8px;
  background: #16a34a;
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* HERO BANNER */
.hero {
  background: linear-gradient(to right, #dc2626, #ea580c);
  color: white;
  padding: 60px 20px;
  text-align: center;
  margin: 20px;
  border-radius: 20px;
}

.hero h2 {
  font-size: 42px;
  margin-bottom: 15px;
}

.hero p {
  font-size: 20px;
  margin-bottom: 30px;
}

.hero-badges {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.badge {
  background: white;
  color: #dc2626;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: bold;
}

/* MAIN CONTAINER */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* SEARCH RESULTS */
.search-results {
  margin-bottom: 20px;
  font-size: 18px;
  color: #666;
}

/* PRODUCTS GRID */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 25px;
  margin-bottom: 40px;
}

.product-card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: all 0.3s;
  cursor: pointer;
}

.product-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 30px rgba(0,0,0,0.2);
}

.product-image {
  width: 100%;
  height: 200px;
  object-fit: cover;
  position: relative;
}

.category-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #dc2626;
  color: white;
  padding: 5px 15px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
}

.product-info {
  padding: 20px;
}

.product-name {
  font-size: 20px;
  font-weight: bold;
  color: #333;
  margin-bottom: 8px;
}

.product-desc {
  font-size: 14px;
  color: #666;
  margin-bottom: 15px;
}

.product-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.product-price {
  font-size: 24px;
  font-weight: bold;
  color: #dc2626;
}

.add-to-cart-btn {
  background: #dc2626;
  color: white;
  padding: 10px 20px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}

.add-to-cart-btn:hover {
  background: #b91c1c;
  transform: scale(1.05);
}

.add-to-cart-btn:active {
  transform: scale(0.95);
}

/* CART VIEW */
.cart-view {
  max-width: 900px;
  margin: 0 auto;
}

.cart-box {
  background: white;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 2px solid #eee;
}

.cart-header h2 {
  font-size: 32px;
  color: #333;
}

.continue-shopping {
  background: none;
  border: none;
  color: #dc2626;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

.continue-shopping:hover {
  text-decoration: underline;
}

/* EMPTY CART */
.empty-cart {
  text-align: center;
  padding: 60px 20px;
}

.empty-cart-icon {
  font-size: 80px;
  margin-bottom: 20px;
}

/* CART ITEMS */
.cart-items {
  margin-bottom: 30px;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 20px;
  background: #f9fafb;
  border-radius: 15px;
  margin-bottom: 15px;
  transition: all 0.3s;
}

.cart-item:hover {
  background: #f3f4f6;
}

.cart-item-image {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
}

.cart-item-info {
  flex: 1;
}

.cart-item-name {
  font-size: 18px;
  font-weight: bold;
  color: #333;
  margin-bottom: 5px;
}

.cart-item-price {
  color: #dc2626;
  font-weight: bold;
}

.quantity-controls {
  display: flex;
  align-items: center;
  gap: 15px;
}

.qty-btn {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  border: none;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.3s;
}

.qty-minus {
  background: #dc2626;
  color: white;
}

.qty-minus:hover {
  background: #b91c1c;
}

.qty-plus {
  background: #16a34a;
  color: white;
}

.qty-plus:hover {
  background: #15803d;
}

.quantity {
  font-weight: bold;
  font-size: 18px;
  min-width: 40px;
  text-align: center;
}

.item-total {
  font-weight: bold;
  font-size: 18px;
  color: #333;
  min-width: 100px;
  text-align: right;
}

.remove-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  transition: transform 0.3s;
}

.remove-btn:hover {
  transform: scale(1.2);
}

/* ORDER SUMMARY */
.order-summary {
  background: linear-gradient(to right, #dc2626, #ea580c);
  color: white;
  padding: 30px;
  border-radius: 15px;
}

.order-summary h3 {
  font-size: 24px;
  margin-bottom: 20px;
}

.summary-items {
  margin-bottom: 20px;
}

.summary-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.summary-total {
  border-top: 2px solid rgba(255,255,255,0.3);
  padding-top: 20px;
  margin-top: 20px;
}

.total-row {
  display: flex;
  justify-content: space-between;
  font-size: 28px;
  font-weight: bold;
}

.place-order-btn {
  width: 100%;
  background: #fbbf24;
  color: #7c2d12;
  padding: 18px;
  border-radius: 15px;
  border: none;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
  transition: all 0.3s;
}

.place-order-btn:hover {
  background: #f59e0b;
  transform: scale(1.02);
}

.place-order-btn:active {
  transform: scale(0.98);
}

/* FOOTER */
footer {
  background: #dc2626;
  color: white;
  text-align: center;
  padding: 30px;
  margin-top: 60px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .header-content {
    flex-direction: column;
  }
  
  .search-container {
    width: 100%;
    max-width: 100%;
  }
  
  .hero h2 {
    font-size: 28px;
  }
  
  .products-grid {
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  }
  
  .cart-item {
    flex-wrap: wrap;
  }
  
  .item-total {
    width: 100%;
    text-align: left;
    margin-top: 10px;
  }
}

.hidden {
  display: none;
}
/* ===== iPhone 12 Pro / Small Mobile FIX ===== */
@media (max-width: 430px) {

  body {
    overflow-x: hidden;
  }

  .header-content {
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
  }

  .logo h1 {
    font-size: 22px;
  }

  .search-container {
    width: 100%;
    max-width: 100%;
  }

  .search-input {
    font-size: 14px;
    padding: 10px 35px;
  }

  .cart-btn {
    width: 100%;
    font-size: 14px;
    padding: 10px;
  }

  .hero {
    margin: 10px;
    padding: 20px 15px;
  }

  .hero h2 {
    font-size: 20px;
  }

  .hero p {
    font-size: 14px;
  }

  .hero-badges {
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-size: 12px;
    padding: 6px 10px;
  }

  .products-grid {
    grid-template-columns: 1fr;
    gap: 15px;
  }

  .product-image {
    height: 150px;
  }

  .product-name {
    font-size: 18px;
  }

  .product-price {
    font-size: 18px;
  }

  .product-footer {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .cart-box {
    padding: 15px;
  }

  .cart-header h2 {
    font-size: 22px;
  }

  .cart-item {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .item-total {
    width: 100%;
    text-align: left;
  }

  .order-summary {
    padding: 15px;
  }

  .order-summary h3 {
    font-size: 20px;
  }

  .order-summary input,
  .order-summary textarea {
    font-size: 14px;
  }

  .place-order-btn {
    font-size: 16px;
    padding: 14px;
  }
  /* ===== HARD FIX: SCREEN SHAKE / JITTER ===== */

html, body {
  max-width: 100%;
  overflow-x: hidden;
}

/* Fix any element pushing screen width */
* {
  max-width: 100%;
}

/* Images safe scaling */
img {
  max-width: 100%;
  display: block;
}

/* Prevent flex overflow */
.header-content,
.hero,
.products-grid,
.cart-item {
  flex-wrap: wrap;
}

/* Force box sizing safe */
* {
  box-sizing: border-box;
}

/* Mobile extra safety */
@media (max-width: 430px) {
  body {
    overflow-x: hidden;
    width: 100%;
  }

  .container {
    overflow-x: hidden;
  }
}
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">🍔</div>
      <div>
        <h1>KababJees</h1>
        <p>Taste the Tradition</p>
      </div>
    </div>

    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        id="searchInput" 
        class="search-input" 
        placeholder="Search for food..."
        oninput="searchProducts()"
      >
    </div>

    <button class="cart-btn" onclick="toggleCart()">
      🛒 Cart (<span id="cartCount">0</span>)
      <span id="cartBadge" class="cart-count hidden">0</span>
    </button>
  </div>
</header>

<!-- MAIN CONTAINER -->
<div class="container">
  
  <!-- HERO BANNER -->
  <div class="hero" id="heroBanner">
    <h2>Welcome to KababJees!</h2>
    <p>Delicious food delivered to your doorstep</p>
    <div class="hero-badges">
      <span class="badge">Fast Delivery</span>
      <span class="badge">Fresh Food</span>
      <span class="badge">Best Prices</span>
    </div>
  </div>

  <!-- SEARCH RESULTS -->
  <div id="searchResults" class="search-results hidden"></div>

  <!-- PRODUCTS VIEW -->
  <div id="productsView">
    <div class="products-grid" id="productsGrid"></div>
    <div id="noResults" class="empty-cart hidden">
      <div class="empty-cart-icon">😞</div>
      <p style="font-size: 20px; color: #666;">No items found. Try a different search!</p>
    </div>
  </div>

  <!-- CART VIEW -->
  <div id="cartView" class="cart-view hidden">
    <div class="cart-box">
      <div class="cart-header">
        <h2>🛒 Your Cart</h2>
        <button class="continue-shopping" onclick="toggleCart()">← Continue Shopping</button>
      </div>

      <div id="cartContent"></div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">🍔 KababJees - Taste the Tradition</p>
  <p style="font-size: 14px; color: #ffcccc;">Made with ❤️ by SherDad</p>
</footer>

<script>

// PRODUCTS DATA
const products = [
  { id: 1, name: 'Zinger Burger', price: 450, image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&h=300&fit=crop', category: 'Burgers', description: 'Crispy zinger patty with special sauce' },
  { id: 2, name: 'Beef Burger', price: 550, image: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=400&h=300&fit=crop', category: 'Burgers', description: 'Juicy beef patty with cheese' },
  { id: 3, name: 'Chicken Roll', price: 350, image: 'https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=400&h=300&fit=crop', category: 'Rolls', description: 'Grilled chicken wrapped in paratha' },
  { id: 4, name: 'Seekh Kabab Roll', price: 380, image: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=400&h=300&fit=crop', category: 'Rolls', description: 'Fresh seekh kabab with mint chutney' },
  { id: 5, name: 'Chicken Biryani', price: 480, image: 'https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=400&h=300&fit=crop', category: 'Rice', description: 'Aromatic basmati rice with chicken' },
  { id: 6, name: 'Pizza Large', price: 1200, image: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400&h=300&fit=crop', category: 'Pizza', description: 'Loaded with cheese and toppings' },
  { id: 7, name: 'French Fries', price: 180, image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=400&h=300&fit=crop', category: 'Sides', description: 'Crispy golden fries' },
  { id: 8, name: 'Cold Drink', price: 120, image: 'https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=400&h=300&fit=crop', category: 'Drinks', description: 'Chilled soft drink' }
];

let cart = [];
let currentView = 'products';
let searchQuery = '';

document.addEventListener('DOMContentLoaded', function() {
  displayProducts(products);
  updateCartCount();
});

// DISPLAY PRODUCTS
function displayProducts(productsToShow) {
  const grid = document.getElementById('productsGrid');
  const noResults = document.getElementById('noResults');

  if (productsToShow.length === 0) {
    grid.innerHTML = '';
    noResults.classList.remove('hidden');
    return;
  }

  noResults.classList.add('hidden');

  grid.innerHTML = productsToShow.map(product => `
    <div class="product-card">
      <div style="position: relative;">
        <img src="${product.image}" class="product-image">
        <span class="category-badge">${product.category}</span>
      </div>
      <div class="product-info">
        <h3 class="product-name">${product.name}</h3>
        <p class="product-desc">${product.description}</p>
        <div class="product-footer">
          <span class="product-price">Rs. ${product.price}</span>
          <button class="add-to-cart-btn" onclick="addToCart(${product.id})">Add to Cart</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ADD TO CART
function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  const existingItem = cart.find(item => item.id === productId);

  if (existingItem) existingItem.quantity++;
  else cart.push({ ...product, quantity: 1 });

  updateCartCount();
}
// SEARCH PRODUCTS (MISSING FUNCTION)
function searchProducts() {
  const input = document.getElementById('searchInput').value.toLowerCase();

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(input) ||
    p.category.toLowerCase().includes(input)
  );

  displayProducts(filtered);
}

// CART COUNT
function updateCartCount() {
  const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
  document.getElementById('cartCount').textContent = totalItems;

  const badge = document.getElementById('cartBadge');
  if (totalItems > 0) {
    badge.textContent = totalItems;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}
// TOGGLE CART
function toggleCart() {
  const productsView = document.getElementById('productsView');
  const cartView = document.getElementById('cartView');
  const heroBanner = document.getElementById('heroBanner');

  if (currentView === 'products') {
    productsView.classList.add('hidden');
    heroBanner.classList.add('hidden');
    cartView.classList.remove('hidden');
    currentView = 'cart';
    displayCart();
  } else {
    cartView.classList.add('hidden');
    productsView.classList.remove('hidden');
    heroBanner.classList.remove('hidden');
    currentView = 'products';
  }
}
// DISPLAY CART + FORM (ADDED)
function displayCart() {
  const cartContent = document.getElementById('cartContent');

  if (cart.length === 0) {
    cartContent.innerHTML = `
      <div class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <p>Your cart is empty</p>
      </div>
    `;
    return;
  }

  const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

  cartContent.innerHTML = `
    <div class="cart-items">
      ${cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">Rs ${item.price} x ${item.quantity}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="order-summary">
      <h3>Total: Rs ${total}</h3>

      <!-- FORM ADDED -->
      <input id="name" placeholder="Full Name" style="width:100%;padding:10px;margin:5px 0;">
      <input id="phone" placeholder="Phone Number" style="width:100%;padding:10px;margin:5px 0;">
      <input id="email" placeholder="Email" style="width:100%;padding:10px;margin:5px 0;">
      <textarea id="address" placeholder="Address" style="width:100%;padding:10px;margin:5px 0;"></textarea>

      <button class="place-order-btn" onclick="placeOrder()">Place Order on WhatsApp</button>
    </div>
  `;
}

// WHATSAPP ORDER (UPDATED)
function placeOrder() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Please fill required fields");
    return;
  }

  const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

  const items = cart.map(i => `${i.name} x${i.quantity}`).join('%0A');

  const message = `New Order%0A
Name: ${name}%0A
Phone: ${phone}%0A
Email: ${email}%0A
Address: ${address}%0A%0A
Items:%0A${items}%0A%0A
Total: Rs ${total}`;

  // YOUR NUMBER HERE
  const whatsappNumber = "923253868605";

  window.open(`https://wa.me/${whatsappNumber}?text=${message}`, "_blank");
}
</script>



</body>
</html>
